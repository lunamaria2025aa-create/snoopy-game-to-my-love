<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snoopy Sweet Snacks 🍓</title>
    <style>
        /* Pantalla completa y reseteo móvil */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #bae6fd;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
        }

        /* Contenedor del juego (Se adapta al tamaño de cualquier celular) */
        #pantalla-juego {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            /* 1. IMAGEN DE FONDO */
            background-image: url('fondo.png'); 
            background-size: cover;
            background-position: center bottom;
        }

        /* Marcador flotante arriba */
        #marcador {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 22px;
            color: #1e293b;
            font-weight: bold;
            line-height: 1.5;
            z-index: 10;
            text-shadow: 2px 2px 0px white;
        }

        /* 2. PERSONAJE SNOOPY (IMAGEN) */
        #snoopy {
            width: 75px;  /* Ajusta el tamaño según tu imagen */
            height: 75px; 
            position: absolute;
            bottom: 40px; /* Separación del borde inferior del celular */
            left: calc(50% - 37.5px);
            background-image: url('snoopy.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            will-change: left;
        }

        /* Snacks que caen (Siguen siendo emojis para no saturar de archivos) */
        .snack {
            position: absolute;
            font-size: 35px;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            z-index: 4;
            will-change: top;
        }

        /* Menú de Inicio / Game Over */
        .pantalla-estado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #6b21a8;
            font-size: 32px;
            margin-bottom: 30px;
        }

        .btn-jugar {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }

        .btn-jugar:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <audio id="musica-fondo" src="musica.mp3" loop></audio>

    <div id="pantalla-juego">
        <div id="marcador">
            Puntos: <span id="puntos">0</span><br>
            Vidas: <span id="vidas">5</span>
        </div>

        <div id="snoopy"></div>

        <div id="menu-inicio" class="pantalla-estado">
            <h1 id="titulo-menu">Snoopy<br>Sweet Snacks</h1>
            <button class="btn-jugar" onclick="comenzarJuego()">¡JUGAR!</button>
        </div>
    </div>

    <script>
        const pantalla = document.getElementById('pantalla-juego');
        const snoopy = document.getElementById('snoopy');
        const txtPuntos = document.getElementById('puntos');
        const txtVidas = document.getElementById('vidas');
        const menuInicio = document.getElementById('menu-inicio');
        const tituloMenu = document.getElementById('titulo-menu');
        const audioMusica = document.getElementById('musica-fondo');

        let puntos = 0;
        let vidas = 5;
        let juegoActivo = false;
        let velocidadCaida = 4;
        let intervaloCreacion;
        
        const anchoSnoopy = 75; 
        let anchoPantalla = pantalla.clientWidth;

        // Lista de bocadillos
        const listaSnacks = ['🍓', '🍩', '🍪', '🍦', '🍰'];

        // Actualizar el ancho si se gira la pantalla del cel
        window.addEventListener('resize', () => {
            anchoPantalla = pantalla.clientWidth;
        });

        // --- CONTROLES PARA CELULAR (Tocar y arrastrar) ---
        function moverSnoopy(coordenadaX) {
            if (!juegoActivo) return;
            
            // Centrar a Snoopy donde el usuario tiene el dedo
            let nuevaPos = coordenadaX - (anchoSnoopy / 2);
            
            // Límites para que no se salga de la pantalla
            if (nuevaPos < 0) nuevaPos = 0;
            if (nuevaPos > (anchoPantalla - anchoSnoopy)) nuevaPos = anchoPantalla - anchoSnoopy;
            
            snoopy.style.left = nuevaPos + 'px';
        }

        // Evento cuando arrastran el dedo por la pantalla
        pantalla.addEventListener('touchmove', (e) => {
            const toque = e.touches[0];
            moverSnoopy(toque.clientX);
        }, { passive: true });

        // Evento para seguir dando soporte al Mouse en PC
        pantalla.addEventListener('mousemove', (e) => {
            const rect = pantalla.getBoundingClientRect();
            moverSnoopy(e.clientX - rect.left);
        });


        // --- LÓGICA DEL JUEGO ---
        function crearSnack() {
            if (!juegoActivo) return;

            const snack = document.createElement('div');
            snack.classList.add('snack');
            snack.innerText = listaSnacks[Math.floor(Math.random() * listaSnacks.length)];
            
            // X aleatoria exacta para el ancho del celular actual
            const xAleatoria = Math.floor(Math.random() * (anchoPantalla - 40));
            snack.style.left = xAleatoria + 'px';
            snack.style.top = '-50px';
            
            pantalla.appendChild(snack);

            let posicionY = -50;
            const altoPantalla = pantalla.clientHeight;
            const limiteSuelo = altoPantalla - 115; // Donde están los pies de Snoopy

            function caer() {
                if (!juegoActivo) {
                    snack.remove();
                    return;
                }

                posicionY += velocidadCaida;
                snack.style.top = posicionY + 'px';

                // Detección de colisión con Snoopy
                if (posicionY >= limiteSuelo && posicionY <= limiteSuelo + 30) {
                    const snackX = parseInt(snack.style.left);
                    const snoopyX = parseInt(window.getComputedStyle(snoopy).left);
                    
                    if (snackX + 35 >= snoopyX && snackX <= snoopyX + anchoSnoopy) {
                        puntos++;
                        txtPuntos.innerText = puntos;
                        snack.remove();

                        if (puntos % 8 === 0) velocidadCaida += 0.7;
                        return;
                    }
                }

                // Si cae al fondo
                if (posicionY > altoPantalla) {
                    snack.remove();
                    vidas--;
                    txtVidas.innerText = vidas;

                    if (vidas <= 0) {
                        finalizarJuego();
                    }
                } else {
                    requestAnimationFrame(caer);
                }
            }

            requestAnimationFrame(caer);
        }

        function comenzarJuego() {
            puntos = 0;
            vidas = 5;
            velocidadCaida = 4;
            anchoPantalla = pantalla.clientWidth;
            snoopy.style.left = `calc(50% - ${anchoSnoopy/2}px)`;
            
            txtPuntos.innerText = puntos;
            txtVidas.innerText = vidas;
            menuInicio.style.display = 'none';
            juegoActivo = true;

            // Reproducir música (los navegadores exigen que el usuario interactúe antes)
            audioMusica.play().catch(error => console.log("Esperando interacción para audio"));

            document.querySelectorAll('.snack').forEach(s => s.remove());

            clearInterval(intervaloCreacion);
            intervaloCreacion = setInterval(crearSnack, 900);
        }

        function finalizarJuego() {
            juegoActivo = false;
            clearInterval(intervaloCreacion);
            audioMusica.pause();
            audioMusica.currentTime = 0; // Reinicia la canción
            tituloMenu.innerHTML = "¡Fin del Juego! 🍓<br><span style='font-size:24px;'>Puntaje: " + puntos + "</span>";
            menuInicio.style.display = 'flex';
        }
    </script>
</body>
</html>
